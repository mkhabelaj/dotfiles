onboarding = false
# herdr configuration — mirrors ~/.config/tmux/tmux.conf as closely as herdr allows.
# Docs/defaults: `herdr --default-config`

[theme]
name = "catppuccin"

auto_switch = false
[terminal]
# Inherit the source pane/workspace directory for new panes (tmux-like).
new_cwd = "follow"

[keys]
# Prefix: Ctrl-A (tmux `set -g prefix C-a`)
prefix = "ctrl+a"

# Reload config — tmux `prefix r`. Frees prefix+r from resize_mode (moved below).
reload_config = "prefix+r"
resize_mode = "prefix+shift+r"

# Splits — tmux `|` side-by-side, `-` stacked.
# herdr can't bind a literal `|`, so vertical split stays on `v`.
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+m"   # tmux `prefix m` (resize-pane -Z)

# Detach — tmux `prefix d`. herdr default is prefix+q.
detach = "prefix+d"

# Pane focus — prefix+Shift+h/j/k/l. Plain prefix+h/j/k/l left free; primary
# nav is the seamless Ctrl-h/j/k/l dispatch below + nvim's tmux-navigator.lua.
focus_pane_left = "prefix+shift+h"
focus_pane_down = "prefix+shift+j"
focus_pane_up = "prefix+shift+k"
focus_pane_right = "prefix+shift+l"

# Toggle previous pane — tmux `prefix ;`
last_pane = "prefix+semicolon"

# Sidebar toggle (moved off prefix+b to free it for workspace cycle)
toggle_sidebar = "prefix+shift+b"

# Agent rows. prefix+[ / prefix+] left free for copy mode / paste — tmux defaults.
focus_agent = "prefix+alt+1..9"
next_agent = "prefix+)"
previous_agent = "prefix+("

# Workspaces (tmux session-like) — b=back/prev, f=forward/next
previous_workspace = "prefix+b"
next_workspace = "prefix+f"
switch_workspace = "prefix+shift+1..9"

# vim-tmux-navigator-style nav. Each Ctrl chord runs the dispatch script:
# if the focused pane runs nvim/vim, the key is forwarded into it (nvim moves
# its split, falling back to `herdr pane focus` only at the edge); otherwise
# the herdr pane is focused directly.
[[keys.command]]
key = "ctrl+h"
type = "shell"
command = "~/.config/herdr/herdr-vim-nav.sh left"

[[keys.command]]
key = "ctrl+j"
type = "shell"
command = "~/.config/herdr/herdr-vim-nav.sh down"

[[keys.command]]
key = "ctrl+k"
type = "shell"
command = "~/.config/herdr/herdr-vim-nav.sh up"

[[keys.command]]
key = "ctrl+l"
type = "shell"
command = "~/.config/herdr/herdr-vim-nav.sh right"

[ui]
# tmux `set -g mouse on`
mouse_capture = true

# No tmux equivalents (herdr handles these itself):
# - base-index / renumber-windows: tabs are managed automatically.
# - vi copy-mode (v/y): use `edit_scrollback` (prefix+e) instead.
# - sesh popup (prefix K/J): use built-in workspace_picker (prefix+w) and goto (prefix+g).
#
# Seamless Ctrl-h/j/k/l nav across nvim splits and herdr panes is handled by
# the [[keys.command]] dispatch above + herdr-vim-nav.sh + nvim's
# tmux-navigator.lua. Requires GNU grep (-P) on PATH.
